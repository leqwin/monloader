services:
  monloader:
    image: ghcr.io/leqwin/monloader:latest
    container_name: monloader
    # Image runs as uid/gid 1000; set this to your host uid:gid.
    user: "1000:1000"
    ports:
      - "127.0.0.1:8081:8081"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /path/to/monloader/config:/config
    environment:
      - MONLOADER_SERVER_BIND_ADDRESS=0.0.0.0:8081
      # Internal URL: how the container reach monbooru on the network
      - MONLOADER_MONBOORU_API_URL=http://monbooru:8080
      # Browser URL: how you reach monbooru in the browser
      - MONLOADER_MONBOORU_WEB_URL=http://localhost:8080
    restart: unless-stopped
