{{define "token_privileges_dialog"}}
<form hx-post="/settings/auth/tokens/{{.ID}}/privileges"
      hx-target="#flash-token-cfg-{{.ID}}" hx-swap="innerHTML">
  <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
  <p class="field-hint">privileges this token grants.</p>
  <ul class="token-scope-list">
    {{range .Scopes}}
    <li><label><input type="checkbox" name="scope" value="{{.Name}}"{{if .Checked}} checked{{end}}{{if $.Paired}} disabled{{end}}> {{.Desc}}</label></li>
    {{end}}
  </ul>
  <div id="flash-token-cfg-{{.ID}}"></div>
  <div class="dialog-actions">
    {{if .Paired}}<span class="field-hint">managed by a pairing.</span>{{else}}<button type="submit">save</button>{{end}}
    <button type="button" onclick="this.closest('dialog').close()">close</button>
  </div>
</form>
{{end}}
