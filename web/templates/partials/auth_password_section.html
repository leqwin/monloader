{{define "auth_password_section"}}
<div id="auth-password-section" class="settings-sub"{{if .OOB}} hx-swap-oob="true"{{end}}>
  <h4>password</h4>
  <p class="field-hint">password authentication is currently <strong>{{if .AuthEnabled}}enabled{{else}}disabled{{end}}</strong>.</p>
  <form hx-post="/settings/auth/password" hx-target="#flash-auth" hx-swap="innerHTML">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <input type="text" name="username" value="operator" autocomplete="username" hidden>
    {{if .AuthEnabled}}
    <div class="field"><label>current password</label><input type="password" name="current_password" autocomplete="current-password"></div>
    {{end}}
    <div class="field"><label>new password</label><input type="password" name="new_password" autocomplete="new-password" required></div>
    <button type="submit">set password</button>
  </form>
  {{if .AuthEnabled}}
  <hr class="settings-subseparator">
  <form hx-post="/settings/auth/remove-password" hx-target="#flash-auth" hx-swap="innerHTML">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <div class="field"><label>current password</label><input type="password" name="current_password" autocomplete="current-password"></div>
    <button type="submit" style="margin-top:8px">remove password</button>
  </form>
  {{end}}
</div>
{{end}}
