{{define "conn_light"}}<span id="conn-light" class="conn-light" data-conn="{{.Conn}}" hx-get="/internal/monbooru-status" hx-trigger="load delay:1s, every 15s" hx-swap="outerHTML">{{if eq .Conn "ok"}}<span class="dot dot-ok"></span> monbooru connected{{else if eq .Conn "rejected"}}<span class="dot dot-rejected"></span> monbooru auth rejected{{else if eq .Conn "down"}}<span class="dot dot-down"></span> monbooru unreachable{{else}}<span class="dot dot-checking"></span> checking monbooru{{end}}</span>{{end}}
